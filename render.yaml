services:
  - type: web
    name: injective-global-cup-backend
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    plan: free
    envVars:
      - key: APP_ENV
        value: production
      - key: LOG_LEVEL
        value: INFO
      - key: STORE_PATH
        value: /data/store.json
      - key: X402_PAYMENT_RECIPIENT
        sync: false
    disk:
      name: predictgoal-data
      mountPath: /data
      sizeGB: 1
